name: Auto sync + release from ryanbr

on:
  schedule:
    # Poll for upstream releases every 6 hours.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-sync-release
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync from ryanbr/noop
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/ryanbr/noop.git
          git fetch --no-tags upstream main:refs/remotes/upstream/main

          upstream_sha=$(git rev-parse upstream/main)
          upstream_version=$(git show upstream/main:android/app/build.gradle.kts \
            | sed -nE 's/.*versionName = "([^"]+)".*/\1/p' \
            | head -1)
          if [ -z "$upstream_version" ]; then
            echo "::error::Could not read upstream Android versionName."
            exit 1
          fi

          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$upstream_version" >> "$GITHUB_OUTPUT"

          if git diff --quiet HEAD upstream/main -- . \
            ":(exclude).github/workflows/**" \
            ":(exclude)altstore-source.json"; then
            echo "Fork already matches upstream/main for auto-syncable files."
          else
            echo "Applying auto-syncable changes from ryanbr/noop at $upstream_sha."
            git diff --binary HEAD upstream/main -- . \
              ":(exclude).github/workflows/**" \
              ":(exclude)altstore-source.json" \
              > /tmp/upstream-auto-sync.patch
            git apply --index /tmp/upstream-auto-sync.patch
            git commit -m "Sync from ryanbr/noop ${upstream_sha:0:8}"
            git push origin HEAD:main
          fi

          if ! git diff --quiet HEAD upstream/main -- .github/workflows \
            ":(exclude).github/workflows/auto-sync-release.yml"; then
            echo "::warning::ryanbr/noop has workflow changes. GitHub's default GITHUB_TOKEN cannot push workflow-file updates, so this workflow leaves .github/workflows unchanged for manual review."
          fi

      - name: Check fork release assets
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ steps.sync.outputs.upstream_version }}
        run: |
          set -euo pipefail

          tag="v${VER}"
          required_assets=(
            "NOOP-android-v${VER}.apk"
            "NOOP-ios-unsigned-v${VER}.ipa"
            "NOOP-macos-v${VER}.zip"
          )

          release_json=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets,targetCommitish 2>/dev/null || true)
          [ -n "$release_json" ] || release_json='{"assets":[],"targetCommitish":""}'
          assets=$(jq -r '.assets[]?.name // empty' <<< "$release_json")
          target=$(jq -r '.targetCommitish // empty' <<< "$release_json")
          missing=0
          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "$asset" <<< "$assets"; then
              echo "Missing release asset: $asset"
              missing=1
            fi
          done
          if [ "$target" != "$(git rev-parse HEAD)" ]; then
            echo "Release $tag targets ${target:-nothing}, not current main $(git rev-parse HEAD)."
            missing=1
          fi

          if [ "$missing" -eq 0 ]; then
            echo "Release $tag already has all expected assets."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag needs to be built or refreshed."
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch release build
        if: steps.release.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run fork-release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f bump=none \
            -f version=

      - name: Summary
        run: |
          {
            echo "### Auto sync + release"
            echo
            echo "- Upstream commit: \`${{ steps.sync.outputs.upstream_sha }}\`"
            echo "- Upstream version: \`${{ steps.sync.outputs.upstream_version }}\`"
            echo "- Release build dispatched: \`${{ steps.release.outputs.needed }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
